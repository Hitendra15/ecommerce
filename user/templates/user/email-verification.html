<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .email-container {
            max-width: 500px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff3f6c;
            margin-bottom: 10px;
        }
        h2 {
            margin: 10px 0;
        }
        p {
            color: #555;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #ff3f6c;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="email-container">
    <div class="logo">🛍 YourStore</div>
    <h2>Verify Your Email</h2>
    <p>Hi {{ user.username }},</p>
    <p>
        Thank you for signing up! Please click the button below to verify your email address.
    </p>
    <a href="http://{{ domain }}{% url 'email_verification' uidb64=user_id token=token %}" class="btn">
        Verify Email
    </a>
    <div class="footer">
        <p>If you did not create an account, you can safely ignore this email.</p>
    </div>
</div>
</body>
</html>
