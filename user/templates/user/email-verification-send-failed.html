<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
        }
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            color: #dc3545;
        }
        h2 {
            margin-bottom: 10px;
            color: #dc3545;
        }
        .info {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #ff3f6c;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }
        .btn:hover {
            background: #e7335d;
        }
        .resend {
            margin-top: 15px;
            font-size: 14px;
        }
        .resend a {
            color: #ff3f6c;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <div class="icon">❌</div>
        <h2>Verification Failed</h2>
        <p class="info">
            The verification link is invalid or has expired.
        </p>
        <p class="info">
            Please request a new verification email and try again.
        </p>
        <a href="{% url 'register' %}" class="btn">
            Go to Register
        </a>
    </div>
</div>
</body>
</html>
