<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
        }
        .verify-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .verify-box {
            width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }
        .subtitle {
            color: #333;
            font-weight: 500;
        }
        .info {
            font-size: 14px;
            color: #777;
            margin-top: 8px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #ff3f6c;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }
        .btn:hover {
            background: #e7335d;
        }
        .resend {
            margin-top: 15px;
            font-size: 14px;
        }
        .resend a {
            color: #ff3f6c;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="verify-container">
    <div class="verify-box">
        <div class="icon">📩</div>
        <h2>Verify Your Email</h2>
        <p class="subtitle">
            We’ve sent a verification link to your email.
        </p>
        <p class="info">
            Please check your inbox and click the link to activate your account.
        </p>
        <p class="info">
            Didn’t receive the email? Check your spam folder.
        </p>
        <!-- Optional dynamic email -->
        <!-- <p class="info">Sent to <strong>{{ user.email }}</strong></p> -->
        <a href="{% url 'login' %}" class="btn">
            Go to Login
        </a>
    </div>
</div>
</body>
</html>
