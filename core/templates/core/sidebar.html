<div class="col-lg-3">
    <div class="sidebar">
        <h5 class="filter-title">Filters</h5>
        <!-- CATEGORY -->
        <div class="filter-section">
            <h6>Category</h6>
            <label><input type="checkbox"> Mobiles</label>
            <label><input type="checkbox"> Laptops</label>
            <label><input type="checkbox"> Keyboards</label>
            <label><input type="checkbox"> Headphones</label>
            <label><input type="checkbox"> Accessories</label>
        </div>
        <!-- BRAND -->
        <div class="filter-section">
            <h6>Brand</h6>
            <label><input type="checkbox"> Apple</label>
            <label><input type="checkbox"> Samsung</label>
            <label><input type="checkbox"> Dell</label>
            <label><input type="checkbox"> HP</label>
            <label><input type="checkbox"> Logitech</label>
        </div>
        <!-- PRICE -->
        <div class="filter-section">
            <h6>Price</h6>
            <div class="price-inputs">
                <input type="number" placeholder="Min">
                <input type="number" placeholder="Max">
            </div>
        </div>
        <!-- RATING -->
        <div class="filter-section">
            <h6>Customer Rating</h6>
            <label><input type="checkbox"> ★★★★ & above</label>
            <label><input type="checkbox"> ★★★ & above</label>
        </div>
        <!-- DISCOUNT -->
        <div class="filter-section">
            <h6>Discount</h6>
            <label><input type="checkbox"> 10% & above</label>
            <label><input type="checkbox"> 30% & above</label>
            <label><input type="checkbox"> 50% & above</label>
        </div>
        <!-- AVAILABILITY -->
        <div class="filter-section">
            <h6>Availability</h6>
            <label><input type="checkbox"> In Stock</label>
        </div>
    </div>
</div>
