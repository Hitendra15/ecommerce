<header class="shop-header">
    <div class="header-container">
        <!-- LOGO -->
        <div class="logo">
            <a href="{% url 'product' %}">MYSHOP</a>
        </div>
        <!-- CATEGORY NAV -->
        <nav class="nav-links">
            <a href="#">Mobiles</a>
            <a href="#">Laptops</a>
            <a href="#">Accessories</a>
            <a href="#">Keyboards</a>
            <a href="#">Headphones</a>
        </nav>
        <!-- SEARCH -->
        <div class="search-box">
            <input type="text" placeholder="Search for mobiles, keyboards, laptops...">
        </div>
        <!-- ACTION ICONS -->
        <div class="header-icons">
            <a href="#">👤 Profile</a>
            <a href="#">❤️ Wishlist</a>
            <a href="{% url 'cart-overview' %}">🛒 Cart
                <span class="cart-count">
                    {% with cart_count=cart|length %}
                    {% if cart_count > 0 %}
                    {{ cart_count }}
                    {% else %}
                    0
                    {% endif %}
                    {% endwith %}
                </span>
            </a>
        </div>
    </div>
</header>
